<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Market Monitor</title>
    <link rel="stylesheet" href="./style.css?v=20260419-split-modules" />
    <script>
      // Inline żeby uniknąć FOUC: ustawiamy motyw zanim CSS się zaaplikuje.
      (function () {
        try {
          var stored = localStorage.getItem("car-market-monitor-theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-theme", stored || (prefersDark ? "dark" : "light"));
        } catch (e) {}
      })();
    </script>
    <!--
      Cache-bust dla wszystkich modułów ES. Entrypoint `app.js?v=…` wymusza
      pobranie nowego kodu, ale jego importy (./core.js, ./views/*.js, …)
      bez parametru siedzą pod stałym URL-em i browser zwraca je ze swojego
      cache — po deployu grozi to wymieszaniem nowego entrypointu ze
      starymi submodułami (crash tylko dla "warm cache" userów).
      Rozwiązanie: import map z jedną stałą wersją mapuje każdy moduł na
      `?v=${V}` wariant. Bump V = nowy URL dla KAŻDEGO modułu. Musi być
      wygenerowana przez document.write PRZED `<script type="module">`,
      żeby browser zdążył zarejestrować map'ę zanim zacznie rezolwować
      pierwsze importy.
    -->
    <script>
      (function () {
        // JEDNO źródło prawdy dla wersji cache-bust. Zmiana tej stałej
        // invaliduje entrypoint + wszystkie submoduły (patrz importmap
        // niżej oraz <script type="module"> na końcu body).
        var V = "20260419-split-modules";
        window.__BUILD_VERSION = V;
        var MODULES = [
          "./app.js",
          "./core.js",
          "./format.js",
          "./router.js",
          "./bootstrap.js",
          "./ui.js",
          "./changes-render.js",
          "./description-render.js",
          "./gallery-lightbox.js",
          "./diff.js",
          "./watchlist.js",
          "./saved-filters.js",
          "./views/home.js",
          "./views/activity.js",
          "./views/listings.js",
          "./views/listing-detail.js",
          "./views/watchlist.js",
          "./views/changes.js",
          "./views/relistings.js",
          "./views/runs.js",
          "../shared/value-added-services.js",
        ];
        var imports = {};
        for (var i = 0; i < MODULES.length; i++) {
          imports[MODULES[i]] = MODULES[i] + "?v=" + V;
        }
        document.write('<script type="importmap">' + JSON.stringify({ imports: imports }) + '<\/script>');
      })();
    </script>
  </head>
  <body>
    <header class="topbar">
      <button
        id="nav-toggle"
        type="button"
        class="nav-toggle"
        aria-expanded="false"
        aria-controls="topbar-nav"
        aria-label="Otwórz menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav id="topbar-nav">
        <a href="#/" data-route="">Home</a>
        <a href="#/activity" data-route="#/activity">Activity</a>
        <a href="#/listings" data-route="#/listings">Listings</a>
        <a href="#/watchlist" data-route="#/watchlist" data-watchlist-link>Watchlist</a>
        <a href="#/changes" data-route="#/changes">Changes</a>
        <a href="#/relistings" data-route="#/relistings">Relistings</a>
        <a href="#/runs" data-route="#/runs">Runs</a>
        <button id="theme-toggle" type="button" class="theme-toggle">Dark</button>
      </nav>
      <div class="topbar-right">
        <span id="db-status" class="status">loading…</span>
      </div>
    </header>
    <main id="view">
      <p class="loading">Wczytuję bazę…</p>
    </main>
    <script src="./sql-wasm.js"></script>
    <!--
      Entrypoint modułu też renderujemy dynamicznie — `<script type="module" src>`
      to klasyczny fetch URL, omija import map. Używając tej samej stałej
      __BUILD_VERSION ustawionej przez poprzedni inline skrypt dostajemy
      pojedyncze źródło prawdy dla wersji: bump w jednym miejscu invaliduje
      entrypoint + wszystkie submoduły naraz.
    -->
    <script>
      document.write(
        '<script type="module" src="./app.js?v=' + window.__BUILD_VERSION + '"><\/script>',
      );
    </script>
  </body>
</html>
