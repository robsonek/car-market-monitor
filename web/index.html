<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Market Monitor</title>
    <link rel="stylesheet" href="./style.css" />
    <script>
      // Inline żeby uniknąć FOUC: ustawiamy motyw zanim CSS się zaaplikuje.
      (function () {
        try {
          var stored = localStorage.getItem("car-market-monitor-theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-theme", stored || (prefersDark ? "dark" : "light"));
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <header class="topbar">
      <nav>
        <a href="#/" data-route="">Home</a>
        <a href="#/activity" data-route="#/activity">Activity</a>
        <a href="#/listings" data-route="#/listings">Listings</a>
        <a href="#/watchlist" data-route="#/watchlist" data-watchlist-link>Obserwowane</a>
        <a href="#/changes" data-route="#/changes">Changes</a>
        <a href="#/runs" data-route="#/runs">Runs</a>
      </nav>
      <div class="topbar-right">
        <span id="db-status" class="status">loading…</span>
        <button id="theme-toggle" type="button" class="theme-toggle">Dark</button>
      </div>
    </header>
    <main id="view">
      <p class="loading">Wczytuję bazę…</p>
    </main>
    <script src="./sql-wasm.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
